---
name: "Build"

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Checkout fonts repository"
        uses: actions/checkout@v6
        with:
          repository: secdrill/Fonts
          path: fonts

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge
          python3 -m pip install --upgrade pip
          python3 -m pip install fonttools

      - name: "Convert otf to ttf"
        run: |
          cd fonts
          python3 ../convert.py
          ls -l ./*.ttf

      - name: "Package ttf files"
        run: find fonts -maxdepth 1 -type f -name "*.ttf" -exec zip -j ComicCode.zip {} +

      - name: "Set release variable"
        run: |
          echo "RELEASE_NAME=Released on $(date -u '+%Y%m%d')" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(awk -F. '{printf("v%d.%d.%d", substr($1,3), $2, $3)}' <<<"$(date -u '+%Y.%m.%d')")" >> "$GITHUB_ENV"

      - name: "Upload release"
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.zip
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          token: ${{ github.token }}
          generate_release_notes: true
