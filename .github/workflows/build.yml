---
name: "Build Comic Code TTF"

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build Comic Code TTF"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          repository: secdrill/Fonts

      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fonttools

      - name: "Convert otf to ttf"
        run: |
          python3 convert.py

      - name: "Package ttf files"
        run: |
          ls -lh *.ttf
          find . -maxdepth 1 -type f -name "*.ttf" -exec zip -j ComicCode.zip {} +
          ls -lh *.zip

      - name: "Set release variable"
        run: |
          echo "RELEASE_NAME=Released on $(date -u '+%Y%m%d' -d '+8 hours')" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(awk -F. '{printf("v%d.%d.%d", substr($1,3), $2, $3)}' <<<"$(date -u '+%Y.%m.%d' -d '+8 hours')")" >> "$GITHUB_ENV"

      - name: "Upload release"
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.zip
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          token: ${{ github.token }}
          generate_release_notes: true
